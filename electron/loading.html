<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Crypto Sniper Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #09090b;
      color: #fff;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container { text-align: center; }
    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #007AFF, #34C759);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      margin: 0 auto 16px;
      border: 3px solid #27272a;
      border-top-color: #007AFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡ CRYPTO SNIPER PRO</div>
    <div class="spinner"></div>
    <div class="status">Iniciando motor de trading...</div>
  </div>
</body>
</html>
